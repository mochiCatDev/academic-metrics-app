<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Metrics App</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Aplicación de métricas académicas</h1>
    </header>

    <!-- Nav -->
    <nav>
        <button id="btn-main">Principal</button>
        <button id="btn-manager">Gestionar</button>
        <button id="btn-about">Acerca de</button>
    </nav>

    <!-- Main -->
    <main>
        <section id="section-main" class="oculto">
            <div class="container-bar-progress">
                <div class="border-bar-progress">
                    <div id="bar-progress"></div>
                </div>
                <div id="text-progress">0%</div>
            </div>
            <div class="container w-75">
                <canvas id="canva" height="100" width="300"></canvas>
            </div>
        </section>

        <section id="section-manager" class="oculto">
            <div class="math">
                <h2>MATEMATICAS</h2>
                <label for="notaMath">Calificaciones</label>
                <input type="number" id="notaMath" placeholder="ingresar notas"/>
                <button id="btn-notaMath"> AGREGAR NOTAS</button>
                <div id="tabla"></div>
            </div>         
            <div class="ing">
                <h2>INGLÉS</h2>
                <label for="notaIng">Calificaciones</label>
                <input type="number" id="notaIng" placeholder="ingresar notas"/>       
                <button id="btn-notaIng"> AGREGAR NOTAS</button>
                <div id="tabla2"></div>
            </div>
            <div class="quimica">
                <h2>QUIMICA</h2>
                <label for="notaQuim">Calificaciones</label>
                <input type="number" id="notaQuim" placeholder="ingresar notas"/>
                <button id="btn-notaQuim"> AGREGAR NOTAS</button>
                <div id="tabla3"></div>
            </div>       
            <div class="biologia">
                <h2>BIOLOGIA</h2>
                <label for="notaBio">Calificaciones</label>
                <input type="number" id="notaBio" placeholder="ingresar notas"/>
                <button id="btn-notaBio"> AGREGAR NOTAS</button>
                <div id="tabla4"></div>
            </div>       
            <div class="filosifia">
                <h2>FILOSOFIA</h2>
                <label for="notaFilo">Calificaciones</label>
                <input type="number" id="notaFilo" placeholder="ingresar notas"/>
                <button id="btn-notaFilo"> AGREGAR NOTAS</button>
                <div id="tabla5"></div>
            </div>       
            <div class="fisica">
                <h2>FISICA</h2>
                <label for="notaFis">Calificaciones</label>
                <input type="number" id="notaFis" placeholder="ingresar notas"/>
                <button id="btn-notaFis"> AGREGAR NOTAS</button>
                <div id="tabla6"></div>
            </div>       
            <div>
                <button onclick="promediar()">promediar</button>
                <div id="promedios">PROMEDIOS</div>
            </div>
        </section>

        <section id="section-about" class="oculto">

        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>Proyecto realizado por el Team D<sup>2</sup></p>
    </footer>

    <!-- Scripts -->
     <script src="js/main.js"></script>
     
</body>
</html>
